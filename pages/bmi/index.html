<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Calculate your Body Mass Index (BMI) and gain insights into your current health and fitness status.">
  <meta name="author" content="Sam Levi Samson">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMI Calculator | Fitness Hub</title>

  <meta property="og:title" content="BMI Calculator | Fitness Hub">
  <meta property="og:description" content="Use the Fitness Hub BMI Calculator to track your health and fitness progress.">
  <meta property="og:image" content="https://wdd330-final-1z0w.onrender.com/images/hero1024.webp">
  <meta property="og:url" content="https://wdd330-final-1z0w.onrender.com/pages/bmi/">
  <link rel="icon" href="/images/favicon.ico">
  <link rel="stylesheet" href="../../styles/styles.css">
</head>
<body>

  <div id="header"></div>

  <main>

    <h1>BMI Calculator</h1>
  
    <form id="bmi-form">
  
      <div>
        <label for="weight">
          Weight (kg)
        </label>
  
        <input
          type="number"
          id="weight"
          min="1"
          step="0.1"
          required
        >
      </div>
  
      <div>
        <label for="height">
          Height (cm)
        </label>
  
        <input
          type="number"
          id="height"
          min="1"
          step="0.1"
          required
        >
      </div>
  
      <button type="submit">
        Calculate BMI
      </button>
  
    </form>
  
    <section id="bmi-result"></section>
  
  </main>
  <script type="module" src="../../scripts/main.js"></script>
  <script type="module" src="../../scripts/pages/bmi-page.js"></script>

  <div id="footer"></div>
</body>
</html>
