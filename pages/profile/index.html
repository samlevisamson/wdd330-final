<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Manage your Fitness Hub profile, track preferences, and personalize your fitness experience.">
  <meta name="author" content="Sam Levi Samson">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile | Fitness Hub</title>

  <meta property="og:title" content="Profile | Fitness Hub">
  <meta property="og:description" content="View and manage your personal fitness profile and account settings.">
  <meta property="og:image" content="https://wdd330-final-1z0w.onrender.com/images/hero1024.webp">
  <meta property="og:url" content="https://wdd330-final-1z0w.onrender.com/pages/profile/">
  <link rel="icon" href="/images/favicon.ico">
  <link rel="stylesheet" href="../../styles/styles.css">
</head>
<body>

  <div id="header"></div>

  <main>

    <section class="profile-card">

      <h1>My Profile</h1>

      <div class="profile-info">

        <p>
          <strong>Name:</strong>
          <span id="profile-name"></span>
        </p>

        <p>
          <strong>Email:</strong>
          <span id="profile-email"></span>
        </p>

      </div>

      <hr>

      <h2>Fitness Goals</h2>

      <form id="profile-form">

        <input
          type="number"
          id="height"
          placeholder="Height (cm)">

        <input
          type="number"
          id="weight"
          placeholder="Weight (kg)">

        <select id="goal">

          <option value="">
            Select Goal
          </option>

          <option value="Weight Loss">
            Weight Loss
          </option>

          <option value="Muscle Gain">
            Muscle Gain
          </option>

          <option value="Maintenance">
            Maintenance
          </option>

        </select>

        <button type="submit">
          Save Profile
        </button>

      </form>

      <p
        id="profile-message"
        class="success-message">
      </p>

      <hr>

      <button
        id="logout-btn"
        class="logout-btn">

        Logout

      </button>

    </section>

  </main>

  <div id="footer"></div>

  <script
    type="module"
    src="../../scripts/main.js">
  </script>

  <script
    type="module"
    src="../../scripts/pages/profile.js">
  </script>

</body>
</html>
