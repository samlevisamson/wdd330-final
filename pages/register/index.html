<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Create a Fitness Hub account to track your fitness goals, manage nutrition plans, and access personalized features.">
  <meta name="author" content="Sam Levi Samson">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Register | Fitness Hub</title>

  <meta property="og:title" content="Register | Fitness Hub">
  <meta property="og:description" content="Join Fitness Hub today and start your journey toward a healthier and stronger lifestyle.">
  <meta property="og:image" content="https://wdd330-final-1z0w.onrender.com/images/hero1024.webp">
  <meta property="og:url" content="https://wdd330-final-1z0w.onrender.com/pages/register/">

  <link rel="icon" href="/images/favicon.ico">
  <link rel="stylesheet" href="../../styles/styles.css">
</head>
<body>

  <div id="header"></div>
  
  <main>

    <section class="auth-container">
  
      <h1>Create Account</h1>
  
      <form
        id="register-form"
        class="auth-form">
  
        <input
          type="text"
          id="first-name"
          placeholder="First Name"
          required>
  
        <input
          type="text"
          id="last-name"
          placeholder="Last Name"
          required>
  
        <input
          type="email"
          id="email"
          placeholder="Email Address"
          required>
  
        <input
          type="password"
          id="password"
          placeholder="Password"
          required>
  
        <input
          type="password"
          id="confirm-password"
          placeholder="Confirm Password"
          required>
  
        <button type="submit">
          Create Account
        </button>
  
      </form>
  
      <p
        id="register-message"
        class="auth-message">
      </p>
  
      <div class="auth-links">
  
        <p>
          Already have an account?
        </p>
  
        <a href="/pages/login/index.html">
          Sign In
        </a>
  
      </div>
  
    </section>
  
  </main>

  <div id="footer"></div>

<script
type="module"
src="../../scripts/main.js">
</script>

<script
type="module"
src="../../scripts/pages/register.js">
</script>

</body>
</html>
